version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: wasslchat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wasslchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wasslchat_dev_2026}
      POSTGRES_DB: ${POSTGRES_DB:-wasslchat}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasslchat"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wasslchat

  redis:
    image: redis:7-alpine
    container_name: wasslchat-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-wasslchat_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "wasslchat_redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wasslchat

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: wasslchat-evolution
    restart: unless-stopped
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-wasslchat_evo_key_2026}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-wasslchat}:${POSTGRES_PASSWORD:-wasslchat_dev_2026}@postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-wasslchat_redis}@redis:6379/1
      LOG_LEVEL: ERROR,WARN,DEBUG,INFO,LOG,VERBOSE
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasslchat

  n8n:
    image: n8nio/n8n:latest
    container_name: wasslchat-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-wasslchat}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-wasslchat_dev_2026}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-wasslchat_n8n}
      WEBHOOK_URL: http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wasslchat

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  wasslchat:
    driver: bridge
